<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Rock Paper Scissors Dynamic Genius (CodePen)</title>
  </head>
  <body>
    <main class="wrap">
      <header class="header">
        <h1>🪨📄✂️ Rock Paper Scissors Dynamic Genius</h1>
        <p class="sub">Standalone demo for CodePen using a simple Markov predictor (offline).</p>
      </header>

      <section class="card">
        <div class="row">
          <button class="move" data-m="rock">Rock</button>
          <button class="move" data-m="paper">Paper</button>
          <button class="move" data-m="scissors">Scissors</button>
          <button id="reset" class="ghost">Reset</button>
        </div>

        <div id="status" class="result"></div>
      </section>

      <section class="card">
        <h2>Stats</h2>
        <div class="stats" id="stats"></div>
      </section>

      <footer class="foot">
        <p>Tip: run the full project locally for UI dashboard dan API logging.</p>
      </footer>
    </main>
  </body>
</html>
